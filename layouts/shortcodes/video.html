{{ $src := .Get "src" }}
{{ $video := .Page.Resources.GetMatch $src }}

<video width="100%" controls muted>
    {{ if $video }}
        <source src="{{ $video.RelPermalink }}" type="video/mp4">
    {{ else }}
        <source src="{{ $src | relURL }}" type="video/mp4">
    {{ end }}
    Your browser does not support the video tag.
</video>
